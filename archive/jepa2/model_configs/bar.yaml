name: bar
# Repo-local checkpoints/metrics (writable in devcontainer). To reuse weights from bulk ``jepa_y``, copy ``*_stage_*.pt`` here or chown the bulk ``metrics/`` dir.
checkpoint_dir: jepa2_checkpoints/bar
train_move_dataset_h5: databases/moves/training_moves_1M.h5
val_move_dataset_h5: databases/moves/validation_moves_1M.h5

val_sample:
  n: 128
  seed: 42

defaults:
  sam_rho: 0.0
  gsnr_probe_every_opt_steps: 8
  ema_momentum: 0.9999
  batch_size: 32
  dataloader_num_workers: 4
  log_interval: 1
  use_amp: true
  weight_decay: 0.01

  M_train: 32
  M_eval: 32
  ce_weight: 1.0
  ce_label_smoothing: 0.2
  ce_temperature: 32.0
  train_shuffle_seed: 7
  vicreg:
    inv_coef: 1.0
    var_coef: 5.0
    cov_coef: 5.0
    std_target: 1.0
    succ_var_coef: 5.0
    succ_cov_coef: 5.0
    succ_std_target: 1.0

architecture:
  id: chess_jepa_v2_fromsq_ln
  config:
    d_model: 256
    encoder_layers: 4
    predictor_layers: 2
    nhead: 8
    dim_feedforward: 1024
    dropout: 0.0
    use_cls: true
    elo_scale: 3000.0

stages:
  - sample:
      n: 8192
      seed: 1
    train:
      epochs: 5
      gradient_accumulation_steps: 32
      learning_rate: 0.00005
      weight_decay: 0.01
  - sample:
      n: 1024
      seed: 1
    train:
      epochs: 10
      gradient_accumulation_steps: 32
      learning_rate: 0.00005
      weight_decay: 0.01
  - sample:
      n: 1024
      seed: 1
    train:
      epochs: 10
      gradient_accumulation_steps: 32
      learning_rate: 0.0002
      weight_decay: 0.01
