name: bakeoff_og_3
# Devcontainer: persistent bulk volume (see .devcontainer/README.md). Override with a repo-relative path if not using the volume.
checkpoint_dir: /mnt/eloquence_bulk/jepa_checkpoints/jepa_y_1M
train_move_dataset_h5: databases/moves/training_moves_1M.h5
val_move_dataset_h5: databases/moves/validation_moves_1M.h5

# Rows sampled from val_move_dataset_h5 only (independent of training file).
val_sample:
  n: 10000
  seed: 42

defaults:
  ema_momentum: 0.99
  triplet_margin_alpha: 1.0
  vicreg_var_coef: 25.0
  vicreg_std_target: 1.0
  batch_size: 256
  dataloader_num_workers: 4
  log_interval: 500
  use_amp: true

architecture:
  id: chess_jepa_v1
  config:
    d_model: 256
    encoder_layers: 4
    predictor_layers: 2
    nhead: 8
    dim_feedforward: 1024
    dropout: 0.0
    use_cls: true
    elo_scale: 3000.0

stages:
  - sample:
      n: 200000
      seed: 1
    hard_negatives:
      n_hard: 4
      m_random: 4
    train:
      epochs: 1
      learning_rate: 0.000025
      weight_decay: 0.01
