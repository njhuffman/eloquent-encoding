# Example rfp spec — set paths to rfp HDF5, jepa3 encoder checkpoint, and gfp stage checkpoint.
#
#   python -m rfp.train --model rfp_example --stage 0
#   python -m rfp.train --model rfp_example --stage 1

name: rfp_example
checkpoint_dir: rfp_checkpoints/rfp_example

encoder_checkpoint: jepa3_checkpoints/j3_gamma/j3_delta_stage_2.pt
gfp_checkpoint: gfp_checkpoints/gfp_example/gfp_example_stage_1.pt

train_dataset_h5: /mnt/eloquence_bulk/databases/rfp_training_16M.h5
val_dataset_h5: /mnt/eloquence_bulk/databases/rfp_validation_1M.h5

val_sample:
  n: 10000
  seed: 42

defaults:
  batch_size: 128
  dataloader_num_workers: 4
  train_shuffle_seed: 7
  use_amp: true
  weight_decay: 0.01
  max_gradient_norm: 1.0
  log_interval: 1
  encoder_strict: true
  seed: 0
  early_stop_train_top1: null

architecture:
  id: rfp_residual_mixer
  config:
    history_len: 8
    mixer_dim: 256
    mixer_depth: 2
    mixer_tokens_mlp_dim: 128
    mixer_channels_mlp_dim: 512
    mixer_dropout: 0.0
    elo_num_buckets: 40
    elo_embed_dim: 32
    residual_hidden: 512
    residual_depth: 2

stages:
  - sample:
      n: 16000000
      seed: 1
    train:
      epochs: 1
      learning_rate: 0.0005
      gradient_accumulation_steps: 1
    sq_ce_label_smoothing: 0.1
    elo_null_prob: 0.1
  - sample:
      n: 1000000
      seed: 2
    train:
      epochs: 1
      learning_rate: 0.0001
      batch_size: 512
    sq_ce_label_smoothing: 0.1
    elo_null_prob: 0.05
