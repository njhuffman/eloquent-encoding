name: j3_gamma
checkpoint_dir: jepa3_checkpoints/j3_gamma
# HDF5: jepa3 packed format only (`python -m jepa3.packed_build build --recipe ... --data-dir ... --output-dir ...`).
train_move_dataset_h5: /mnt/eloquence_bulk/databases/j3_training_1M.h5
val_move_dataset_h5: /mnt/eloquence_bulk/databases/j3_validation_1M.h5

val_sample:
  n: 10
  seed: 42

dashboard_metrics:
  move_benchmark_sample_n: 2048
  move_benchmark_seed: 42
  move_benchmark_train_seed: 1000045
  move_benchmark_succ_chunk: 256
  device: auto

defaults:
  batch_size: 128 # 1024
  dataloader_num_workers: 4
  log_interval: 1
  use_amp: true
  weight_decay: 0.01
  train_shuffle_seed: 7
  gsnr_probe_every_opt_steps: 0
  sam_rho: 0.0
  from_sq_unknown_probability: 0.0
  aux_board_recon_weight: 0.05
  aux_meta_weight: 0.025

architecture:
  id: chess_jepa_v4
  config:
    d_model: 256
    encoder_layers: 4
    nhead: 8
    dim_feedforward: 1024
    dropout: 0.0
    jepa_square_embed_dim: 64
    predictor_hidden: 512
    predictor_depth: 3
    from_to_head_hidden: 512
    from_to_head_depth: 2
    aux_board_recon_hidden: 256
    aux_meta_hidden: 256

stages:

  # Phase 1. Goal: ground the model in good reconstruction loss
  # Looking for 99% reconstruction before the end so we see good
  # scores on boards not yet memorized.
  - sample:
      n: 1000000
      seed: 1
    train:
      epochs: 1
      gradient_accumulation_steps: 1
      learning_rate: 0.0005
      weight_decay: 0.01
    ema_momentum: 0.999
    jepa_weight: 0.01
    from_sq_ce_weight: 0.01
    to_sq_ce_weight: 0.01
    sq_ce_label_smoothing: 0.1
    vicreg:
      inv_coef: 0.01
      var_coef: 0.01
      cov_coef: 0.01
      std_target: 1.0
    aux_board_recon_weight: 10.0
    aux_meta_weight: 1.0
    
    
  # Phase 2. Goal: improve prediction losses
  - sample:
      n: 1000000
      seed: 1
    train:
      epochs: 1
      gradient_accumulation_steps: 1
      learning_rate: 0.0005
      weight_decay: 0.01
    ema_momentum: 0.999
    jepa_weight: 1.0
    from_sq_ce_weight: 1.0
    to_sq_ce_weight: 1.0
    sq_ce_label_smoothing: 0.1
    vicreg:
      inv_coef: 0.01
      var_coef: 0.01
      cov_coef: 0.01
      std_target: 1.0
    aux_board_recon_weight: 1.0
    aux_meta_weight: 1.0
  # aftee this, already seeing like 35% move prediction,
  # guessing likely overfit and should scale up
  - sample:
      n: 1000000
      seed: 1
    train:
      epochs: 5
      gradient_accumulation_steps: 1
      learning_rate: 0.0005
      weight_decay: 0.01
    ema_momentum: 0.999
    jepa_weight: 1.0
    from_sq_ce_weight: 1.0
    to_sq_ce_weight: 1.0
    sq_ce_label_smoothing: 0.1
    vicreg:
      inv_coef: 0.01
      var_coef: 0.01
      cov_coef: 0.01
      std_target: 1.0
    aux_board_recon_weight: 1.0
    aux_meta_weight: 1.0
