      n: 131072
      seed: 1
    train:
      epochs: 1
      gradient_accumulation_steps: 1
      learning_rate: 0.00005
      weight_decay: 0.01
    ema_momentum: 0.99
    jepa_weight: 1.0
    from_sq_ce_weight: 0.0
    to_sq_ce_weight: 0.0
    sq_ce_label_smoothing: 0.1
