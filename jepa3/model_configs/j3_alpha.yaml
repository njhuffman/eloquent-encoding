name: j3_alpha
checkpoint_dir: jepa3_checkpoints/j3_alpha
train_move_dataset_h5: databases/moves/training_moves_1M.h5
val_move_dataset_h5: databases/moves/validation_moves_1M.h5

val_sample:
  n: 10000
  seed: 42

dashboard_metrics:
  move_benchmark_sample_n: 2048
  move_benchmark_seed: 42
  move_benchmark_train_seed: 1000045
  move_benchmark_succ_chunk: 256
  device: auto

defaults:
  batch_size: 1024
  dataloader_num_workers: 4
  log_interval: 1
  use_amp: true
  weight_decay: 0.01
  train_shuffle_seed: 7
  gsnr_probe_every_opt_steps: 0
  sam_rho: 0.0
  from_sq_unknown_probability: 0.0

architecture:
  id: chess_jepa_v3
  config:
    d_model: 256
    encoder_layers: 4
    nhead: 8
    dim_feedforward: 1024
    dropout: 0.0
    use_cls: true
    jepa_square_embed_dim: 64
    predictor_hidden: 256
    predictor_depth: 4
    from_to_head_hidden: 512
    from_to_head_depth: 3

stages:
