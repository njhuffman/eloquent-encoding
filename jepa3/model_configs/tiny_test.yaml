name: tiny_test
checkpoint_dir: jepa3_checkpoints/tiny_test
train_move_dataset_h5: databases/moves/training_moves_1M.h5
val_move_dataset_h5: databases/moves/validation_moves_1M.h5

val_sample:
  n: 128
  seed: 42

dashboard_metrics:
  move_benchmark_sample_n: 512
  move_benchmark_seed: 42
  move_benchmark_train_seed: 1000045
  move_benchmark_succ_chunk: 128
  device: cpu

defaults:
  batch_size: 8
  weight_decay: 0.05
  dataloader_num_workers: 0
  log_interval: 5
  use_amp: true
  val_legal_seed: 42
  train_shuffle_seed: 7
  gsnr_probe_every_opt_steps: 0

architecture:
  id: chess_jepa_v3
  config:
    d_model: 128
    encoder_layers: 2
    nhead: 4
    dim_feedforward: 512
    dropout: 0.0
    use_cls: true
    predictor_prefix_dims: 64
    jepa_square_embed_dim: 48
    predictor_hidden: 256
    predictor_depth: 2
    from_to_head_hidden: 128
    from_to_head_depth: 2

stages:
  - sample:
      n: 256
      seed: 1
    train:
      epochs: 1
      learning_rate: 0.0001
      weight_decay: 0.01
    ema_momentum: 0.99
    jepa_weight: 1.0
    from_sq_ce_weight: 0.5
    to_sq_ce_weight: 0.5
    sq_ce_label_smoothing: 0.0
    vicreg:
      inv_coef: 0.05
      var_coef: 0.1
      cov_coef: 0.0
      std_target: 1.0
    move_head_prefix_leak: 0.0
