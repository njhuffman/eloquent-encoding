# 16M WDL training dataset: half of the j3_training_32M recipe (take_games 400k -> 200k),
# same month (2025-01), same 10 strata (elo 1000-1999), same samples_per_game=8 and
# same seeds -> 16M is a strict SUBSET of 32M (clean scaling comparison).
name: wdl_training_16M

master_seed: 1
time_control: 600+0
bucket_by: white
skip_opening_plies: 4
exclude_single_legal_move: false

source_plans:
  - source: lichess_db_standard_rated_2025-01_tc_600_0.pgn.zst
    strata:
      - {elo_min: 1000, elo_max: 1099, take_games: 200000, samples_per_game: 8, stratum_seed: 1001}
      - {elo_min: 1100, elo_max: 1199, take_games: 200000, samples_per_game: 8, stratum_seed: 1002}
      - {elo_min: 1200, elo_max: 1299, take_games: 200000, samples_per_game: 8, stratum_seed: 1003}
      - {elo_min: 1300, elo_max: 1399, take_games: 200000, samples_per_game: 8, stratum_seed: 1004}
      - {elo_min: 1400, elo_max: 1499, take_games: 200000, samples_per_game: 8, stratum_seed: 1005}
      - {elo_min: 1500, elo_max: 1599, take_games: 200000, samples_per_game: 8, stratum_seed: 1006}
      - {elo_min: 1600, elo_max: 1699, take_games: 200000, samples_per_game: 8, stratum_seed: 1007}
      - {elo_min: 1700, elo_max: 1799, take_games: 200000, samples_per_game: 8, stratum_seed: 1008}
      - {elo_min: 1800, elo_max: 1899, take_games: 200000, samples_per_game: 8, stratum_seed: 1009}
      - {elo_min: 1900, elo_max: 1999, take_games: 200000, samples_per_game: 8, stratum_seed: 1010}
