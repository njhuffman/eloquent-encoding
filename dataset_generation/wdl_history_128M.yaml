# ~124M-sample training gen: last-4-ply history (emitted automatically by the builder) + WDL,
# across 12 bands (1000-2199). Sized from scripts/band_census.py (2026-06-30).
#
# Spread: bands 1000-2099 are EVEN at the fair share ~10.66M samples each
#   (take_games=333000 x 4 sources x 8 = 10,656,000; every cell clears 333k -- scarcest is
#    2025-02/2000-2099 = 371,395). Band 2100-2199 is too sparse to fill evenly (only ~0.85M
#    games across 4 months), so it takes ~95% of its per-source census (margin so the ~1.7%
#    short-game drop does not trip _ensure_strata_quotas_met and fail a shard).
#   Totals: 11 x 10,656,000 + 6,464,000 = ~123.7M samples.
#
# Bands 1000-2099 are perfectly even; 2100-2199 is intentionally smaller (~6.5M, all available
# strong-club play -- honest size, not oversampled). This needs MultiBandPolicy.head_index
# extended to 12 heads (clamp 1000-2199, //100 -> 12 buckets) + bands set in the model config to
# actually route these as their own strength level. (Mining captures the data either way.)
#
# Train: 2025-01/02/03/04. Validation is held out on 2025-05 (wdl_validation_2025_05.yaml) -> zero
# train/val month overlap.
name: wdl_history_128M

master_seed: 1
time_control: 600+0
bucket_by: white
skip_opening_plies: 4
exclude_single_legal_move: false

source_plans:
