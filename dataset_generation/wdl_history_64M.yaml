# Next overnight gen: WDL 64M (Jan+Feb 2025) + last-4-ply history (emitted automatically by the
# updated builder) + EXTENDED bands 2000-2199. Strata 1000-1999 match wdl_training_64M (clean
# superset); 2000-2099 / 2100-2199 added on top (scarcer — take_games is a cap, builder takes
# min(take_games, available); log realized counts). No 2200+ (too sparse to fill a head).
