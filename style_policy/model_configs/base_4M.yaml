# Data-scaling probe: identical to base_16M except 4M unique positions (1 epoch) and
# warmup scaled to the same ~1.6% fraction. Same val set / lr / schedule / dtype / batch,
# so final val is directly comparable to base_16M (saturation: does 4x more data help?).
name: base_4M
checkpoint_dir: style_policy_checkpoints/base_4M
train_h5: /mnt/eloquence_bulk/databases/j3_training_16M.h5
val_h5: /mnt/eloquence_bulk/databases/j3_validation_1M.h5
val_sample: {n: 10000, seed: 42}
wandb:
  project: style_policy
  mode: online
architecture:
  d_model: 256
  n_layers: 8
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.0
  head_hidden: 512
  elo_dim: 32
  n_elo_buckets: 40
  use_castling_ep: true
  use_cls_in_heads: true
defaults:
  batch_size: 256
  dataloader_num_workers: 4
  use_amp: true
  amp_dtype: bf16
  weight_decay: 0.01
  max_gradient_norm: 1.0
  log_interval: 50
  val_interval: 500          # ~31 val points over the shorter (15625-step) run
  checkpoint_interval: 500
  gradient_accumulation_steps: 1
  lr_schedule: cosine
  warmup_steps: 250          # ~1.6% of 15625 steps (matches base_16M's 1000/62500)
  lr_min_frac: 0.0
  seed: 0
stages:
  - sample: {n: 4000000, seed: 1}
    train: {epochs: 1, learning_rate: 0.0002}
    label_smoothing: 0.1
