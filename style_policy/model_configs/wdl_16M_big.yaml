# Big arch (384/12, ~22.6M params, ~3.3x base) on the 16M WDL set (policy + value head).
# Same data/recipe as wdl_16M, bigger model. torch.compile on (default). Expect ~5h on the 4GB GPU.
name: wdl_16M_big
checkpoint_dir: style_policy_checkpoints/wdl_16M_big
train_h5: /mnt/eloquence_bulk/databases/wdl_training_16M.h5
val_h5: /mnt/eloquence_bulk/databases/wdl_validation_1M.h5
val_sample: {n: 10000, seed: 42}
wandb:
  project: style_policy
  mode: online
architecture:
  d_model: 384
  n_layers: 12
  nhead: 8
  dim_feedforward: 1536
  dropout: 0.0
  head_hidden: 768
  elo_dim: 32
  n_elo_buckets: 40
defaults:
  batch_size: 256
  dataloader_num_workers: 4
  use_amp: true
  amp_dtype: bf16
  weight_decay: 0.01
  max_gradient_norm: 1.0
  log_interval: 50
  val_interval: 1000
  checkpoint_interval: 1000
  gradient_accumulation_steps: 1
  lr_schedule: cosine
  warmup_steps: 2000
  lr_min_frac: 0.0
  seed: 0
  value_loss_weight: 1.0
stages:
  - sample: {n: 16000000, seed: 1}
    train: {epochs: 1, learning_rate: 0.0002}
    label_smoothing: 0.1
