# HELD overnight run: multiband + last-move history, 12 bands (1000-2199), ~124M samples.
# Mine first: scripts/mine_parallel.py on dataset_generation/wdl_history_128M.yaml -> shuffle-merge
# -> wdl_history_128M.h5 (globally shuffled). Validation = wdl_validation_2025_05.h5 (held-out month
# 2025-05; carries history -> usable for the inference K-sweep).
#
# 12 bands: `bands:` below drives MultiBandPolicy (12 BandHeads); head_index is band-derived, so
# 2000-2099 -> head 10 and 2100-2199 -> head 11 (no longer clamped into the 1900 head).
# preshuffled: true -> sequential read of the pre-shuffled file (zero random reads, single epoch).
# n_elo_buckets=40 already covers 2000-2199 in the value head (elo//100 -> bucket 20/21).
name: multiband_history_128M
checkpoint_dir: style_policy_checkpoints/multiband_history_128M
train_h5: /mnt/eloquence_bulk/databases/wdl_history_128M.h5
val_h5: /mnt/eloquence_bulk/databases/wdl_validation_2025_05.h5
val_sample: {n: 10000, seed: 42}
preshuffled: true
wandb:
  project: style_policy
  mode: online
architecture:
  d_model: 256
  n_layers: 8
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.0
  head_hidden: 512
  elo_dim: 32
  n_elo_buckets: 40
  use_castling_ep: true
  use_cls_in_heads: true
  use_last_move: true
  n_history_ply: 2          # 16M K-sweep: history gain saturates at K=2 (K=3/4 add ~0)
  bands: [1000, 1100, 1200, 1300, 1400, 1500, 1600, 1700, 1800, 1900, 2000, 2100]
defaults:
  batch_size: 256
  dataloader_num_workers: 4
  use_amp: true
  amp_dtype: bf16
  weight_decay: 0.01
  max_gradient_norm: 1.0
  log_interval: 50
  val_interval: 2000
  checkpoint_interval: 2000
  lr_schedule: cosine
  warmup_steps: 2000
  lr_min_frac: 0.0
  seed: 0
  value_loss_weight: 1.0
  last_move_dropout: 0.15   # binary: 15% of samples see NO history (keeps FEN/puzzle usability)
  history_dropout: binary   # full-2-ply or none (no intermediate horizons); see 16M K-sweep
  # Step-tagged scale snapshots (batch 256): 62500=16M, 125000=32M, 250000=64M samples seen.
  # Enables a history K-sweep at each scale from ONE run (final ~483125 steps = 123.68M).
  snapshot_steps: [62500, 125000, 250000]
stages:
  - sample: {n: 123680000, seed: 1}
    train: {epochs: 1, learning_rate: 0.0002}
    label_smoothing: 0.1
