name: base_16M
checkpoint_dir: style_policy_checkpoints/base_16M
train_h5: /mnt/eloquence_bulk/databases/j3_training_16M.h5
val_h5: /mnt/eloquence_bulk/databases/j3_validation_1M.h5
val_sample: {n: 10000, seed: 42}
wandb:
  project: style_policy
  mode: online   # online | offline | disabled (or set WANDB_MODE env to override)
architecture:
  d_model: 256
  n_layers: 8
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.0
  head_hidden: 512
  elo_dim: 32
  n_elo_buckets: 40
defaults:
  batch_size: 128
  dataloader_num_workers: 4
  use_amp: true
  weight_decay: 0.01
  max_gradient_norm: 1.0
  log_interval: 50
  val_interval: 2000          # ~every few minutes at ~77ms/step; validation on val_h5 subset
  checkpoint_interval: 2000   # resumable checkpoint cadence (resume with: --resume)
  gradient_accumulation_steps: 2
  seed: 0
stages:
  - sample: {n: 16000000, seed: 1}
    train: {epochs: 1, learning_rate: 0.0005}
    label_smoothing: 0.1
